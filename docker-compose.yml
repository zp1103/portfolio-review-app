services:
  portfolio-review:
    image: ${IMAGE_NAME:-portfolio-review-app:latest}
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
    container_name: portfolio-review-app
    init: true
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
